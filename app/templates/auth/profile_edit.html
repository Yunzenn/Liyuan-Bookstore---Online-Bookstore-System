{% extends "base.html" %}

{% block title %}编辑个人信息 - 梨园书屋{% endblock %}

{% block content %}
<div class="container">
<div class="page-header">
    <h1>编辑个人信息</h1>
    <p>更新您的账户信息</p>
</div>

<div style="max-width: 600px; margin: 0 auto;">
    <div class="card">
        <form method="POST" action="{{ url_for('auth.profile_edit') }}">
            <div class="form-group">
                <label class="form-label" for="customer_name">客户姓名 *</label>
                <input type="text" id="customer_name" name="customer_name" class="form-input"
                       value="{{ customer.customer_name }}" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="phone">电话号码</label>
                <input type="tel" id="phone" name="phone" class="form-input"
                       value="{{ customer.phone or '' }}" placeholder="请输入电话">
            </div>

            <div class="form-group">
                <label class="form-label" for="address">地址</label>
                <input type="text" id="address" name="address" class="form-input"
                       value="{{ customer.address or '' }}" placeholder="请输入地址">
            </div>

            <div style="display: flex; gap: 12px; margin-top: 32px;">
                <button type="submit" class="btn btn-primary">保存修改</button>
                <a href="{{ url_for('auth.profile') }}" class="btn btn-secondary">取消</a>
            </div>
        </form>
    </div>
</div>
</div>
{% endblock %}
